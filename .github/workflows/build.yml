name: build

on:
    push:
        branches:
            - "*"
    pull_request:
        branches:
            - "*"

jobs:
    test:
        if: "!contains(github.event.head_commit.message, 'skip ci')"
        strategy:
            fail-fast: false
            matrix:
                php: [8.4, 8.3, 8.2, 8.1, 8.0, 7.4]
                laravel: [13.*, 12.*, 11.*, 10.*, 9.*, 8.*, 7.*, 6.*]
                dependency-version: [prefer-stable]
                os: [ubuntu-latest]
                include:
                    - laravel: 13.*
                      testbench: 11.*
                    - laravel: 12.*
                      testbench: 10.*
                    - laravel: 11.*
                      testbench: 9.*
                    - laravel: 10.*
                      testbench: 8.*
                    - laravel: 9.*
                      testbench: 7.*
                    - laravel: 8.*
                      testbench: 6.*
                    - laravel: 7.*
                      testbench: 5.*
                    - laravel: 6.*
                      testbench: 4.*
                    - php: 8.4
                      unitconfig: phpunit_gt_81.xml
                    - php: 8.3
                      unitconfig: phpunit_gt_81.xml
                    - php: 8.2
                      unitconfig: phpunit_gt_81.xml
                    - php: 8.1
                      unitconfig: phpunit_gt_81.xml
                    - php: 8.0
                      unitconfig: phpunit.xml
                    - php: 7.4
                      unitconfig: phpunit.xml
                exclude:
                    - laravel: 13.*
                      php: 8.2
                    - laravel: 13.*
                      php: 8.1
                    - laravel: 13.*
                      php: 8.0
                    - laravel: 13.*
                      php: 7.4
                    - laravel: 12.*
                      php: 8.1
                    - laravel: 12.*
                      php: 8.0
                    - laravel: 12.*
                      php: 7.4
                    - laravel: 11.*
                      php: 8.1
                    - laravel: 11.*
                      php: 8.0
                    - laravel: 11.*
                      php: 7.4
                    - laravel: 10.*
                      php: 8.0
                    - laravel: 10.*
                      php: 7.4
                    - laravel: 9.*
                      php: 7.4
                    - laravel: 8.*
                      php: 7.4
                    - laravel: 7.*
                      php: 8.0
                    - laravel: 7.*
                      php: 8.1
                    - laravel: 7.*
                      php: 8.2
                    - laravel: 7.*
                      php: 8.3
                    - laravel: 7.*
                      php: 8.4
                    - laravel: 6.*
                      php: 8.0
                    - laravel: 6.*
                      php: 8.1
                    - laravel: 6.*
                      php: 8.2
                    - laravel: 6.*
                      php: 8.3
                    - laravel: 6.*
                      php: 8.4
        runs-on: ${{ matrix.os }}
        name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }} - ${{ matrix.os }}
        env:
            extensions: intl, json, mbstring, dom, curl, openssl, gd

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.composer/cache/files
                  key: dependencies-laravel-${{ matrix.laravel }}-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}

            - name: Setup PHP extensions
              id: cache-env
              uses: shivammathur/cache-extensions@v1
              with:
                  php-version: ${{ matrix.php }}
                  extensions: ${{ env.extensions }}
                  key: php-extensions-cache-v1

            - name: Setup PHP ${{ matrix.php }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: ${{ env.extensions }}
                  tools: composer
              env:
                  COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Laravel ${{ matrix.laravel }}
              run: |
                  composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
                  composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-suggest

            - name: Run tests
              run: |
                  vendor/bin/phpunit -c ${{ matrix.unitconfig }} --no-coverage

    coverage:
        if: "!contains(github.event.head_commit.message, 'skip ci')"
        runs-on: ubuntu-latest
        name: Coverage P8.4 - L13
        env:
            extensions: intl, json, mbstring, dom, curl, openssl, gd

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP 8.4
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: ${{ env.extensions }}
                  coverage: xdebug
                  tools: composer
              env:
                  COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Laravel 13
              run: |
                  composer require "laravel/framework:13.*" "orchestra/testbench:11.*" --no-interaction --no-update
                  composer update --prefer-stable --prefer-dist --no-interaction --no-suggest

            - name: Run coverage
              run: |
                  vendor/bin/phpunit -c phpunit_gt_81.xml --coverage-clover=coverage.clover
